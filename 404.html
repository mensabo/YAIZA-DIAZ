    <!-- Google tag (gtag.js) - Consent Mode: analytics_storage denegado por defecto,
         nuestro propio banner de cookies (ver script.js) lo actualiza a
         "granted" cuando el usuario acepta cookies analiticas -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied'
      });
    </script>
    <script>
      // Retrasa la carga de gtag.js (~700ms de bloqueo del hilo principal
      // segun un informe real de Lighthouse) hasta la primera interaccion
      // real o hasta que el navegador este inactivo, lo que ocurra antes,
      // con un limite de tiempo para no perder el dato en visitas pasivas.
      (function () {
        var loaded = false;
        function loadGtag() {
          if (loaded) return;
          loaded = true;
          var script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-GPTS82X18T';
          document.head.appendChild(script);
        }
        ['scroll', 'mousemove', 'keydown', 'touchstart', 'click'].forEach(function (evt) {
          window.addEventListener(evt, loadGtag, { passive: true, once: true });
        });
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGtag, { timeout: 4000 });
        } else {
          setTimeout(loadGtag, 4000);
        }
      })();
    </script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-GPTS82X18T');
    </script>
